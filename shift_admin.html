<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light">
<title>シフト管理（管理者用）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{background:#f5f5f2;color-scheme:light;}
html,body{height:100%;font-family:system-ui,sans-serif;}
body{background:var(--bg);color:var(--t1);}
:root{
  --bg:#f5f5f2;--card:#fff;--bd:#e2e1dc;
  --t1:#1a1a18;--t2:#5a5a56;--t3:#aaa9a4;
  --btn:#eeede8;--btn-bd:#d8d7d2;
  --hd:#fff;--hd-bd:#e2e1dc;
  --purple:#7c4dff;--purple-bg:#ede8fb;
  --ok-d:#b8e8cc;--ok-db:#2a9e52;--ok-dt:#1a6b3a;
  --ng-d:#f8c8c8;--ng-db:#d93030;--ng-dt:#9a1818;
  --tm-d:#c8dff8;--tm-db:#2272cc;--tm-dt:#0e449a;
}
.app{max-width:1600px;margin:0 auto;padding:0 24px 40px;}
.hd{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--hd-bd);margin-bottom:16px;}
.hd h1{font-size:18px;font-weight:700;}
.layout-sw{display:flex;border:1px solid var(--btn-bd);border-radius:8px;overflow:hidden;}
.layout-sw div{padding:7px 14px;font-size:13px;cursor:pointer;color:var(--t2);}
.layout-sw div.on{background:var(--t1);color:#fff;}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--bd);margin-bottom:20px;}
.tab{padding:11px 22px;font-size:17px;font-weight:500;color:var(--t1);cursor:pointer;border-bottom:2px solid transparent;border-radius:8px 8px 0 0;}
.tab.on{color:#fff;font-weight:700;background:var(--t1);border-bottom-color:var(--t1);}
.split{display:none;gap:20px;}
.split.on{display:flex;}
.split>div{flex:1;min-width:0;}
.single{display:none;}
.single.on{display:block;}
.panel-ttl{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--t1);}
.week-tabs{display:flex;gap:6px;margin-bottom:14px;}
.week-tab{padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;background:var(--btn);color:var(--t2);}
.week-tab.on{background:var(--t1);color:#fff;}
.subtabs{display:flex;gap:4px;margin-bottom:12px;}
.stab{padding:7px 16px;text-align:center;border-radius:6px;border:1px solid var(--bd);font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;background:var(--btn);}
.stab.on{background:var(--purple);color:#fff;border-color:var(--purple);}
.ai-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:10px 12px;background:var(--card);border:1px solid var(--bd);border-radius:8px;}
.ai-status{font-size:12px;color:var(--t3);}
.ai-btn{background:var(--purple-bg);color:#5c3dc8;border:2px solid var(--purple);border-radius:7px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;}
.ai-btn:hover{opacity:.9;}
.publish-row{margin-top:14px;}
.publish-btn{width:100%;padding:11px;background:var(--btn);color:var(--t3);border:1px solid var(--btn-bd);border-radius:8px;font-size:13px;cursor:not-allowed;}
.publish-btn.ready{background:var(--ok-d);color:var(--ok-dt);border-color:var(--ok-db);cursor:pointer;}
.legend{font-size:11px;color:var(--t3);margin:8px 0 4px;}
.gantt-outer{overflow-x:auto;border:1px solid var(--bd);border-radius:6px;background:var(--card);}
.gantt-inner{min-width:0;}
.g-day-block{border-bottom:1px solid var(--bd);}
.g-tick{position:absolute;font-size:9px;color:var(--t1);top:3px;transform:translateX(-50%);font-weight:500;}
.g-bar-row{display:flex;align-items:stretch;}
.g-row-lbl{width:60px;flex-shrink:0;border-right:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:center;height:30px;}
.g-track{flex:1;position:relative;height:30px;}
.g-bar{position:absolute;top:2px;bottom:2px;display:flex;align-items:center;justify-content:flex-start;font-size:12px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;padding:0 6px;border-radius:0;cursor:pointer;}
.g-bar.unassigned{background:var(--btn)!important;color:#9a1818;border:2px solid #d93030;animation:blinkRed 1s infinite;}
@keyframes blinkRed{0%,100%{border-color:#d93030;}50%{border-color:transparent;}}
.g-bar .nm{overflow:hidden;text-overflow:ellipsis;text-align:left;}
.g-bar.dragover{outline:2px dashed #fff;}
.g-bar.violate{outline:2px solid #ffdd00;}
.c-sat{color:#2272cc;} .c-sun{color:#d93030;}
.sched-tbl{border-collapse:collapse;width:100%;font-size:12px;}
.sched-tbl th,.sched-tbl td{border:1px solid var(--bd);padding:6px 8px;text-align:center;white-space:nowrap;}
.sched-tbl th{background:var(--btn);}
.s-ok{color:#2a9e52;font-weight:700;} .s-ng{color:#d93030;font-weight:700;} .s-tm{color:#2272cc;font-weight:600;}
.s-nodata{background:#fbe2e2;color:#a3231a;font-weight:600;}
.emp-list{display:flex;flex-direction:column;gap:10px;}
.emp-card{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;}
.emp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.emp-name{font-size:14px;font-weight:700;}
.emp-meta{font-size:11px;color:var(--t3);}
.con-chip{display:inline-flex;align-items:center;gap:6px;background:var(--btn);border:1px solid var(--btn-bd);border-radius:6px;padding:4px 8px;font-size:12px;margin:2px 4px 2px 0;}
.con-chip button{border:none;background:none;color:var(--t3);cursor:pointer;font-size:12px;}
.add-con{font-size:12px;color:var(--purple);cursor:pointer;margin-top:6px;display:inline-block;}
.own-wish{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:14px;margin-top:16px;}
.own-wish-row{display:flex;gap:8px;margin-top:8px;}
.own-wish-input{flex:1;height:36px;border:1px solid var(--btn-bd);border-radius:6px;padding:0 10px;font-size:13px;background:var(--btn);color:var(--t1);}
.mic-btn{width:36px;height:36px;border-radius:6px;border:1px solid var(--btn-bd);background:var(--btn);cursor:pointer;font-size:15px;}
.popover{position:absolute;background:var(--card);border:1px solid var(--bd);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:400;min-width:140px;padding:4px;}
.popover div{padding:7px 10px;font-size:13px;border-radius:5px;cursor:pointer;}
.popover div:hover{background:var(--btn);}
.popover .none{color:var(--t3);font-size:12px;padding:7px 10px;}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;}
.mbg.open{display:flex;}
.modal2{background:var(--card);border-radius:12px;padding:20px;width:92%;max-width:480px;max-height:86vh;overflow-y:auto;}
.modal2 .m-ttl{font-size:16px;font-weight:700;margin-bottom:14px;}
.modal2 select{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--btn);color:var(--t1);font-size:14px;margin-bottom:10px;}
.dg-grid{display:flex;gap:4px;margin:12px 0;}
.dg-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0;}
.dg-wd{font-size:12px;font-weight:700;color:var(--t2);}
.dg-btn{width:100%;padding:9px 0;border-radius:6px;border:2px solid;font-weight:700;text-align:center;cursor:pointer;font-size:14px;}
.dg-btn.ok{color:#2a9e52;border-color:#2a9e52;}
.dg-btn.ng{color:#d93030;border-color:#d93030;}
.dg-btn.tm{color:#2272cc;border-color:#2272cc;font-weight:400;font-size:12px;}
.dg-times{margin-top:4px;}
.dg-time-row{display:flex;align-items:center;gap:6px;padding:5px 0;font-size:13px;border-bottom:1px solid var(--bd);}
.dg-time-row .dg-time-wd{width:28px;font-weight:700;}
.dg-time-row select{width:auto;margin-bottom:0;padding:5px 6px;font-size:13px;}
.modal2 .m-actions{display:flex;gap:8px;margin-top:16px;}
.modal2 .m-actions button{flex:1;padding:10px;border-radius:8px;border:1px solid var(--bd);cursor:pointer;font-size:14px;}
.modal2 .m-actions .save{background:var(--t1);color:#fff;border:none;}
</style>

<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-auth-compat.js"></script>

<link rel="icon" type="image/png" href="favicon-32x32.png" sizes="32x32">
<link rel="icon" type="image/png" href="favicon-16x16.png" sizes="16x16">

<body>
<div class="app">
  <div id="fb-error-banner" style="display:none;background:#fdecea;color:#a3231a;border:1px solid #f5c2c0;border-radius:8px;padding:12px 16px;margin-bottom:14px;font-size:14px;"></div>

<div class="mbg" id="manual-input-modal" onclick="if(event.target===this)closeManualInput()">
  <div class="modal2">
    <div class="m-ttl">希望データの手動入力</div>
    <select id="mi-name-select" onchange="onManualSelectChange()"></select>
    <select id="mi-week-select" onchange="onManualSelectChange()"></select>
    <div id="mi-grid"></div>
    <div id="mi-times"></div>
    <div class="m-actions">
      <button onclick="closeManualInput()">キャンセル</button>
      <button class="save" onclick="saveManualInput()">保存</button>
    </div>
  </div>
</div>

<div class="mbg" id="reg-modal" onclick="if(event.target===this)closeRegModal()">
  <div class="modal2">
    <div class="m-ttl" id="reg-modal-ttl">通常シフトパターン設定</div>
    <div id="reg-grid2"></div>
    <div id="reg-times2"></div>
    <div class="m-actions">
      <button onclick="closeRegModal()">キャンセル</button>
      <button class="save" onclick="saveRegModal()">保存</button>
    </div>
  </div>
</div>

  <div class="hd">
    <h1>シフト管理（管理者用） ver1.22</h1>
    <div style="display:flex;align-items:center;gap:10px;">
      <button style="width:34px;height:34px;border-radius:6px;border:1px solid var(--btn-bd);background:var(--btn);cursor:pointer;" onclick="undoAction()" title="元に戻す">↶</button>
      <button style="width:34px;height:34px;border-radius:6px;border:1px solid var(--btn-bd);background:var(--btn);cursor:pointer;" onclick="redoAction()" title="やり直す">↷</button>
      <button id="refresh-btn" style="height:34px;padding:0 12px;border-radius:6px;border:1px solid var(--btn-bd);background:var(--btn);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;white-space:nowrap;" onclick="refreshAllData()" title="更新"><span id="refresh-btn-icon">⟳</span><span id="refresh-btn-label">更新</span></button>
      <button style="height:34px;padding:0 12px;border-radius:6px;border:1px solid var(--btn-bd);background:var(--btn);cursor:pointer;font-size:13px;" onclick="tempSave()">一時保存</button>
      <div class="layout-sw" id="layout-sw">
        <div class="on" onclick="setLayout('single',this)">単一表示</div>
        <div onclick="setLayout('split',this)">分割表示</div>
      </div>
    </div>
  </div>

  <div class="tabs" id="main-tabs">
    <div class="tab on" onclick="swMain('create',this)">シフト作成</div>
    <div class="tab" onclick="swMain('sched',this)">スケジュール確認</div>
    <div class="tab" onclick="swMain('emp',this)">従業員設定</div>
    <div class="tab" onclick="swMain('hist',this)">過去シフト</div>
  </div>

  <div class="single on" id="single-create"></div>
  <div class="single" id="single-sched"></div>
  <div class="single" id="single-emp"></div>
  <div class="single" id="single-hist"></div>

  <div class="split" id="split-view">
    <div>
      <select class="week-tab" id="pane-a-select" onchange="setPane('a',this.value)" style="margin-bottom:10px;">
        <option value="create">シフト作成</option>
        <option value="sched">スケジュール確認</option>
        <option value="emp">従業員設定</option>
        <option value="hist">過去シフト</option>
      </select>
      <div id="pane-a-content"></div>
    </div>
    <div>
      <select class="week-tab" id="pane-b-select" onchange="setPane('b',this.value)" style="margin-bottom:10px;">
        <option value="create">シフト作成</option>
        <option value="sched" selected>スケジュール確認</option>
        <option value="emp">従業員設定</option>
        <option value="hist">過去シフト</option>
      </select>
      <div id="pane-b-content"></div>
    </div>
  </div>
</div>

<script>
var WDS = ['月','火','水','木','金','土','日'];
var CON_TYPES = [
  {type:'hourCap', label:'扶養上限（月間時間）', hasValue:true, valueLabel:'時間/月'},
  {type:'eveningOnly', label:'平日は指定時刻以降のみ', hasValue:true, valueLabel:'時以降'},
  {type:'noWeekday', label:'指定曜日は出勤不可', hasValue:true, valueLabel:'曜日（例:火）'},
  {type:'note', label:'その他（自由記述）', hasValue:true, valueLabel:'内容'}
];

var COLOR_PALETTE = ['#e040a0','#7c4dff','#00acc1','#e91e63','#5c6bc0','#26c6da','#ab47bc','#42a5f5','#ff7043','#26a69a','#1e88e5','#00897b','#c9a227','#6d4c41','#8d6e63','#78909c'];

// ==== Firebase 初期化 ====
var firebaseConfig = {
  apiKey: "AIzaSyBN2kououNO6Aep0br1xNjP3cD8JtjfbuE",
  authDomain: "lawson-shift.firebaseapp.com",
  projectId: "lawson-shift",
  storageBucket: "lawson-shift.firebasestorage.app",
  messagingSenderId: "1030300896272",
  appId: "1:1030300896272:web:e749747af81b36532b0e95"
};
firebase.initializeApp(firebaseConfig);
var fbAuth = firebase.auth();
var fbDb = firebase.firestore();

// 従業員名簿はFirestoreの employees コレクションから読み込む（起動時のみ取得）
var EMPLOYEES = [];

function showFbError(msg){
  var el = document.getElementById('fb-error-banner');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideFbError(){
  document.getElementById('fb-error-banner').style.display = 'none';
}

function fetchEmployees(){
  return fbDb.collection('employees').get().then(function(snapshot){
    var list = [];
    snapshot.forEach(function(doc){
      var d = doc.data();
      list.push({
        name: d.name,
        store: d.store,
        role: d.role,
        color: d.color,
        constraints: d.constraints || [],
        active: d.active !== false,
        regularShift: d.regularShift || null
      });
    });
    EMPLOYEES = list;
  });
}

var pendingWrites = 0;
function showToast(msg){
  var el = document.getElementById('fb-toast');
  if(!el){
    el = document.createElement('div');
    el.id = 'fb-toast';
    el.style.cssText = 'position:fixed;right:20px;bottom:20px;background:var(--t1);color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(el._hideTimer);
  el._hideTimer = setTimeout(function(){ el.style.opacity = '0'; }, 2000);
}

function syncEmployeeToFirestore(name, data){
  pendingWrites++;
  fbDb.collection('employees').doc(name).set(data, {merge:true}).then(function(){
    showToast('保存しました（'+name+'）');
  }).catch(function(err){
    showFbError('保存に失敗しました（'+name+'）: '+err.message+'　※画面上の変更は反映されていますが、Firestoreへの保存には失敗しています。「更新」を押すと最新のFirestoreの内容に戻る可能性があります。');
  }).then(function(){
    pendingWrites--;
  });
}

function hasUnsavedChanges(){
  return pendingWrites > 0;
}

function setRefreshBtnLabel(text){
  document.getElementById('refresh-btn-label').textContent = text;
}

// ==== レギュラーパターン（シフト作成の基本形。週をまたいで共通・Firestore永続化） ====
var REGULAR_PATTERN = null;
function getBoard(weekIdx){
  return weekIdx==='pattern' ? REGULAR_PATTERN : DRAFTS[weekIdx];
}
function buildDefaultPattern(){
  var honten = WDS.map(function(wd,i){ return {wd:wd, date:'', staff: JSON.parse(JSON.stringify(PATTERN_HONTEN[i]))}; });
  var hospital = WDS.map(function(wd,i){ return {wd:wd, date:'', staff: JSON.parse(JSON.stringify(PATTERN_HOSPITAL[i]))}; });
  return {honten:honten, hospital:hospital, violations:[], unplaced:[]};
}
function fetchRegularPattern(){
  return fbDb.collection('settings').doc('regularPattern').get().then(function(doc){
    if(doc.exists){
      REGULAR_PATTERN = doc.data();
    } else {
      REGULAR_PATTERN = buildDefaultPattern();
      return fbDb.collection('settings').doc('regularPattern').set(REGULAR_PATTERN);
    }
  });
}

function allNeededWeekIds(){
  var ids = {};
  WEEKS_CREATE.concat(WEEKS_SCHED).forEach(function(w){ ids[w.weekId] = true; });
  return Object.keys(ids);
}

function fetchDrafts(){
  var jobs = WEEKS_CREATE.map(function(w, idx){
    return fbDb.collection('drafts').doc(w.weekId).get().then(function(doc){
      DRAFTS[idx] = doc.exists ? doc.data() : null;
    });
  });
  return Promise.all(jobs);
}
function saveDraftToFirestore(weekIdx){
  if(weekIdx==='pattern'){
    pendingWrites++;
    fbDb.collection('settings').doc('regularPattern').set(REGULAR_PATTERN).catch(function(err){
      showFbError('通常シフトパターンの保存に失敗しました: '+err.message);
    }).then(function(){ pendingWrites--; });
    return;
  }
  var wk = WEEKS_CREATE[weekIdx];
  if(!wk) return;
  var draft = DRAFTS[weekIdx];
  pendingWrites++;
  var op = draft === null
    ? fbDb.collection('drafts').doc(wk.weekId).delete()
    : fbDb.collection('drafts').doc(wk.weekId).set(draft);
  op.catch(function(err){
    showFbError('下書きの保存に失敗しました（'+wk.label+'）: '+err.message);
  }).then(function(){ pendingWrites--; });
}
function fetchPublishedShifts(){
  return fbDb.collection('shifts').get().then(function(snapshot){
    var fetched = [];
    snapshot.forEach(function(doc){
      var d = doc.data();
      fetched.push({label:d.label, honten:d.honten, hospital:d.hospital, weekId:doc.id, _fromFirestore:true});
    });
    fetched.sort(function(a,b){ return (b.weekId||'').localeCompare(a.weekId||''); });
    var baseline = HISTORY_SHIFTS.filter(function(h){ return !h._fromFirestore; });
    HISTORY_SHIFTS = fetched.concat(baseline);
  });
}

function refreshAllData(){
  if(hasUnsavedChanges()){
    if(!confirm('保存処理がまだ完了していません。更新しますか？')) return;
  }
  setRefreshBtnLabel('更新中...');
  fetchEmployees().then(function(){
    return Promise.all([fetchAvailability(allNeededWeekIds()), fetchDrafts(), fetchPublishedShifts(), fetchRegularPattern()]);
  }).then(function(){
    hideFbError();
    UNDO_STACK = [];
    REDO_STACK = [];
    renderAll();
    setRefreshBtnLabel('更新完了');
    setTimeout(function(){ setRefreshBtnLabel('更新'); }, 5000);
  }).catch(function(err){
    showFbError('データの取得に失敗しました: '+err.message);
    setRefreshBtnLabel('更新');
  });
}

function initApp(){
  fbAuth.signInAnonymously().then(function(){
    return fetchEmployees();
  }).then(function(){
    return Promise.all([fetchAvailability(allNeededWeekIds()), fetchDrafts(), fetchPublishedShifts(), fetchRegularPattern()]);
  }).then(function(){
    renderAll();
  }).catch(function(err){
    showFbError('Firestoreへの接続に失敗しました: '+err.message+'　画面を再読み込みしてやり直してください。');
  });
}

function getMonday(d) {
  var date = new Date(d.getTime());
  var day = date.getDay();
  var diff = day === 0 ? -6 : 1 - day;
  date.setDate(date.getDate() + diff);
  date.setHours(0,0,0,0);
  return date;
}
function formatWeekId(date) {
  var y = date.getFullYear();
  var m = ('0'+(date.getMonth()+1)).slice(-2);
  var d = ('0'+date.getDate()).slice(-2);
  return y+'-'+m+'-'+d;
}
function generateRollingWeeks(count) {
  var monday = getMonday(new Date());
  var weeks = [];
  for (var w=0; w<count; w++){
    var base = new Date(monday.getTime());
    base.setDate(base.getDate() + w*7);
    var days = [];
    for (var di=0; di<7; di++){
      var dt = new Date(base.getTime());
      dt.setDate(dt.getDate()+di);
      days.push((dt.getMonth()+1)+'/'+dt.getDate());
    }
    weeks.push({ weekId: formatWeekId(base), label: days[0]+' 〜 '+days[6], days: days });
  }
  return weeks;
}
function getPrevWeekId(weekId){
  var parts = weekId.split('-').map(Number);
  var d = new Date(parts[0], parts[1]-1, parts[2]);
  d.setDate(d.getDate()-7);
  return formatWeekId(d);
}

// 構造: AVAIL_DATA[weekId][従業員名] = {days:[{s,in,out,freeText} x7], memo, status}
var AVAIL_DATA = {};

function dayToDisplay(day){
  if(!day) return null;
  if(day.s==='ok') return '〇';
  if(day.s==='ng') return '×';
  if(day.freeText) return day.freeText;
  if(day.in!=null && day.out!=null) return day.in+'～'+day.out;
  if(day.in!=null) return day.in+'～';
  if(day.out!=null) return '～'+day.out;
  return '〇';
}
function rawToDay(raw){
  var p = parseAvail(raw);
  if(p.s==='ng') return {s:'ng', in:null, out:null, freeText:null};
  if(p.s==='note') return {s:'tm', in:null, out:null, freeText:p.text};
  if(p.s==='tm' && p.in==null && p.out==null) return {s:'ok', in:null, out:null, freeText:null};
  return {s:'tm', in:p.in, out:p.out, freeText:null};
}

function getAvail(weekId, name, di){
  var rec = AVAIL_DATA[weekId] && AVAIL_DATA[weekId][name];
  if(!rec || !rec.days) return null;
  return dayToDisplay(rec.days[di]);
}
function setAvail(weekId, name, di, val){
  if(!AVAIL_DATA[weekId]) AVAIL_DATA[weekId] = {};
  if(!AVAIL_DATA[weekId][name] || !AVAIL_DATA[weekId][name].days){
    var blank = [];
    for(var i=0;i<7;i++) blank.push({s:'ok', in:null, out:null, freeText:null});
    AVAIL_DATA[weekId][name] = {days: blank, memo:'', status:{sent:true, resent:false, at:''}};
  }
  AVAIL_DATA[weekId][name].days[di] = rawToDay(val);
  syncAvailabilityToFirestore(weekId, name);
}
function syncAvailabilityToFirestore(weekId, name){
  var rec = AVAIL_DATA[weekId][name];
  pendingWrites++;
  fbDb.collection('availability').doc(weekId+'_'+name).set(rec, {merge:true}).then(function(){
    showToast('保存しました（'+name+'）');
  }).catch(function(err){
    showFbError('保存に失敗しました（'+name+' '+weekId+'）: '+err.message);
  }).then(function(){
    pendingWrites--;
  });
}
function fetchAvailability(weekIds){
  var names = EMPLOYEES.filter(function(e){ return e.active!==false; }).map(function(e){ return e.name; });
  var jobs = [];
  weekIds.forEach(function(weekId){
    if(!AVAIL_DATA[weekId]) AVAIL_DATA[weekId] = {};
    names.forEach(function(name){
      jobs.push(
        fbDb.collection('availability').doc(weekId+'_'+name).get().then(function(doc){
          if(doc.exists) AVAIL_DATA[weekId][name] = doc.data();
        })
      );
    });
  });
  return Promise.all(jobs);
}

// 〇/×/時間帯テキストを解析。〇は「全時間シフト可」（配置時に営業時間へクランプ）。開始・終了省略時もnullで同様に営業時間で補う
function parseAvail(raw){
  if(!raw || raw==='〇') return {s:'tm', in:null, out:null};
  if(raw==='×') return {s:'ng'};
  var m = raw.match(/^(\d+)～(\d+)$/);
  if(m) return {s:'tm', in:+m[1], out:+m[2]};
  m = raw.match(/^(\d+)～$/);
  if(m) return {s:'tm', in:+m[1], out:null};
  m = raw.match(/^～(\d+)$/);
  if(m) return {s:'tm', in:null, out:+m[1]};
  return {s:'note', text:raw};
}

// 最低人数設定：6/29週の月曜日の実際の人員カバレッジ形状を初期値として自動生成（人員設定タブでガント風に編集可能）
function buildSegmentsFromCoverage(pattern, gST, gEN){
  var counts = [];
  for(var h=gST; h<gEN; h++){
    counts.push(pattern.filter(function(s){ return s.in<=h && s.out>h; }).length || 1);
  }
  var segs = [];
  var curVal = counts[0], curStart = gST;
  for(var i=1; i<counts.length; i++){
    if(counts[i]!==curVal){
      segs.push({hFrom:curStart, hTo:gST+i, min:curVal});
      curStart = gST+i; curVal = counts[i];
    }
  }
  segs.push({hFrom:curStart, hTo:gEN, min:curVal});
  return segs;
}

function assignBreaksForBoard(board, boardName, weekIdx){
  var gEN = boardName==='hospital'?20:23, gST = boardName==='hospital'?7:6;
  board.forEach(function(day, di){
    var entries = day.staff.filter(function(s){ return s.n && (s.out-s.in)>=6 && !s.breaks; });
    // 主力度が高い人から優先的に希望の休憩タイミングを確保
    entries.sort(function(a,b){ return (TOTAL_HOURS[b.n]||0)-(TOTAL_HOURS[a.n]||0); });
    var usedSlots = []; // {in,out} already used for breaks this day/board
    entries.forEach(function(s){
      var rel = (BREAK_REL_START[di] && BREAK_REL_START[di][s.n]) || 3;
      var target = s.in + rel;
      var lo = s.in+1, hi = s.out-2; // 前後最低1時間は勤務が残るように
      if(hi<lo) return; // 6時間未満は既に除外済みだが安全策
      var candidates = [];
      for(var offset=0; offset<=(hi-lo); offset++){
        [target-offset, target+offset].forEach(function(h){
          if(h>=lo && h<=hi && candidates.indexOf(h)===-1) candidates.push(h);
        });
      }
      var best = null, bestScore = -Infinity;
      candidates.forEach(function(h){
        // その時間、他に何人働いているか（自分以外）
        var others = day.staff.filter(function(x){ return x!==s && x.in<=h && x.out>h+1; }).length;
        if(others<1) return; // ワンオペになるので休憩不可
        var overlapUsed = usedSlots.some(function(u){ return u.in===h; });
        var score = -Math.abs(h-target) - (overlapUsed?5:0);
        if(score>bestScore){ bestScore=score; best=h; }
      });
      if(best!==null){
        s.breaks = [{in:best, out:best+1}];
        usedSlots.push({in:best,out:best+1});
      }
    });
  });
}

function segIntersect(a, b){
  var lo = Math.max(a.in, b.in), hi = Math.min(a.out, b.out);
  if(hi<=lo) return null;
  return {in:lo, out:hi};
}

function generateDraft(weekIdx){
  pushHistory();
  var honten = WEEKS_CREATE[weekIdx].days.map(function(dt,i){ return {wd:WDS[i], date:dt, staff:[]}; });
  var hospital = WEEKS_CREATE[weekIdx].days.map(function(dt,i){ return {wd:WDS[i], date:dt, staff:[]}; });
  var hourTotals = {};
  var violations = [];
  var unplaced = [];
  var notes = [];
  var hcConOf = function(emp){ return emp.constraints.find(function(c){return c.type==='hourCap';}); };
  var assignedTodayByDi = [{},{},{},{},{},{},{}];

  function tryCommit(emp, di, segData, board, breaks){
    var reason = checkConstraint(emp, di, segData.in);
    if(reason){ violations.push(emp.name+'（'+WDS[di]+'）: '+reason); return false; }
    var dur = segDur(segData);
    var hcCon = hcConOf(emp);
    if(hcCon){
      hourTotals[emp.name] = hourTotals[emp.name] || 0;
      if(hourTotals[emp.name] + dur > hcCon.value){ violations.push(emp.name+'（'+WDS[di]+'）: 扶養上限'+hcCon.value+'時間/月を超過するため未配置'); return false; }
      hourTotals[emp.name] += dur;
    }
    var entry = {n: emp.name, in:segData.in, out:segData.out};
    if(breaks) entry.breaks = breaks;
    if(emp.store==='both') entry.dual = true;
    board[di].staff.push(entry);
    assignedTodayByDi[di][emp.name] = true;
    return true;
  }

  ['honten','hospital'].forEach(function(sub){
    var board = sub==='honten' ? honten : hospital;
    var gST = sub==='hospital' ? 7 : 6, gEN = sub==='hospital' ? 20 : 23;
    for(var di=0; di<7; di++){
      var srcEntries = REGULAR_PATTERN[sub][di].staff;
      srcEntries.forEach(function(tpl){
        var emp = empByName(tpl.n);
        var storeOk = emp && (emp.store==='both' || (sub==='honten' && emp.store==='honten') || (sub==='hospital' && emp.store==='hospital'));
        var isActive = emp && emp.active!==false;
        var placedTemplate = false;
        if(isActive && storeOk){
          var raw = getAvail(WEEKS_CREATE[weekIdx].weekId, tpl.n, di);
          var w = parseAvail(raw);
          if(w.s==='tm'){
            var avail = {in: w.in===null?gST:w.in, out: w.out===null?gEN:w.out};
            var eff = segIntersect(tpl, avail);
            if(eff){
              var breaksToUse = (eff.in===tpl.in && eff.out===tpl.out) ? tpl.breaks : undefined;
              placedTemplate = tryCommit(emp, di, eff, board, breaksToUse);
            }
          }
        }
        if(!placedTemplate){
          // スケジュールと合わない枠 → 人未設定（赤点滅）にして手動選択を促す
          board[di].staff.push({n:null, in:tpl.in, out:tpl.out, unassigned:true});
          notes.push(tpl.n+'（'+WDS[di]+' '+tpl.in+'〜'+tpl.out+'時）が不在のため未設定（要選択）');
        }
      });
    }
  });

  assignBreaksForBoard(honten, 'honten', weekIdx);
  assignBreaksForBoard(hospital, 'hospital', weekIdx);
  DRAFTS[weekIdx] = {honten:honten, hospital:hospital, violations:violations, unplaced:unplaced, notes:notes};
}

  if(!getBoard(weekIdx)){ alert('先に下書きを作成してください'); return; }

  getBoard(weekIdx)[subInput][di].staff.push({n:null, in:inH, out:outH+1, unassigned:true});
  renderAll();
  saveDraftToFirestore(weekIdx);
}

// ガントの空白部分クリックで新規勤務枠を追加（曜日・店舗はクリック位置から自動判定、時間帯はクリックX座標から推測）
function onTrackClick(ev, weekIdx, sub, di){
  if(ev.target !== ev.currentTarget) return; // バー自体のクリックはstopPropagationで届かないが念のためのガード
  if(!getBoard(weekIdx)){ alert('先に下書きを作成してください'); return; }
  var gST = sub==='hospital'?7:6, gEN = sub==='hospital'?20:23;
  var rect = ev.currentTarget.getBoundingClientRect();
  var ratio = (ev.clientX - rect.left) / rect.width;
  var guessIn = Math.round(gST + ratio*(gEN-gST));
  guessIn = Math.max(gST, Math.min(gEN-2, guessIn));
  var guessOut = Math.min(gEN-1, guessIn+5);
  addNewSlotAt(weekIdx, sub, di, guessIn, guessOut);
}
function addNewSlotAt(weekIdx, sub, di, guessIn, guessOut){
  var gST = sub==='hospital'?7:6, gEN = sub==='hospital'?20:23;
  var timeInput = prompt('時間帯を入力（例: '+guessIn+'-'+guessOut+' → '+guessIn+'時台〜'+(guessOut-1)+'時台）', guessIn+'-'+guessOut);
  if(timeInput===null) return;
  var m = timeInput.trim().match(/^(\d+)[-~～](\d+)$/);
  if(!m){ alert('入力形式が正しくありません（例: 10-15）'); return; }
  var inH = Number(m[1]), outH = Number(m[2]);
  if(inH<gST || outH>=gEN || outH<=inH){ alert('営業時間（'+gST+'〜'+gEN+'時）の範囲内で入力してください'); return; }
  pushHistory();
  getBoard(weekIdx)[sub][di].staff.push({n:null, in:inH, out:outH+1, unassigned:true});
  renderAll();
  saveDraftToFirestore(weekIdx);
}

function moveToOtherStore(weekIdx, sub, day, idx){
  closePopover();
  pushHistory();
  var fromBoard = getBoard(weekIdx)[sub];
  var toSub = sub==='honten' ? 'hospital' : 'honten';
  var toBoard = getBoard(weekIdx)[toSub];
  var entry = fromBoard[day].staff.splice(idx, 1)[0];
  var gEN = toSub==='hospital' ? 20 : 23, gST = toSub==='hospital' ? 7 : 6;
  if(entry.in < gST) entry.in = gST;
  if(entry.out > gEN) entry.out = gEN;
  toBoard[day].staff.push(entry);
  renderAll();
  saveDraftToFirestore(weekIdx);
}

function packRows(staff){
  var sorted = staff.slice().sort(function(a,b){return a.in-b.in;});
  var rows = [];
  sorted.forEach(function(s){
    var placed=false;
    for(var r=0;r<rows.length;r++){
      var last = rows[r][rows[r].length-1];
      if(last.out <= s.in){ rows[r].push(s); placed=true; break; }
    }
    if(!placed) rows.push([s]);
  });
  return rows;
}

function makeStripes(gST,gEN){
  var sp=gEN-gST, html='';
  for(var h=gST; h<gEN; h++){
    var l=((h-gST)/sp*100).toFixed(2), w=(1/sp*100).toFixed(2);
    if((h-gST)%2===0) html += '<div style="position:absolute;left:'+l+'%;width:'+w+'%;top:0;bottom:0;background:var(--btn);"></div>';
  }
  return html;
}
function makeTicks(gST,gEN,understaffed){
  var sp=gEN-gST, html='';
  for(var h=gST; h<gEN; h++){
    var l=((h-gST+0.5)/sp*100).toFixed(2);
    var style = understaffed && understaffed.indexOf(h)>-1 ? 'left:'+l+'%;color:#d93030;font-weight:800;' : 'left:'+l+'%;';
    html += '<div class="g-tick" style="'+style+'">'+h+'</div>';
  }
  return html;
}

function adjustBarTime(weekIdx,sub,day,idx,field,delta){
  var bar = getBoard(weekIdx)[sub][day].staff[idx];
  var gEN = sub==='hospital'?20:23, gST = sub==='hospital'?7:6;
  if(field==='in'){
    var newIn = bar.in+delta;
    if(newIn<gST || newIn>=bar.out){ alert('その時間には変更できません（営業時間内かつ終了時刻より前にしてください）'); return; }
    pushHistory();
    bar.in = newIn;
  } else {
    var newOut = bar.out+delta;
    if(newOut>gEN || newOut<=bar.in){ alert('その時間には変更できません（営業時間内かつ開始時刻より後にしてください）'); return; }
    pushHistory();
    bar.out = newOut;
  }
  if(bar.breaks) bar.breaks = bar.breaks.filter(function(b){ return b.in>=bar.in && b.out<=bar.out; });
  renderAll();
  saveDraftToFirestore(weekIdx);
  refreshBarPopover(weekIdx,sub,day,idx);
}
function shiftBar(weekIdx,sub,day,idx,delta){
  var bar = getBoard(weekIdx)[sub][day].staff[idx];
  var gEN = sub==='hospital'?20:23, gST = sub==='hospital'?7:6;
  var newIn = bar.in+delta, newOut = bar.out+delta;
  if(newIn<gST || newOut>gEN){ alert('営業時間の範囲外になるため移動できません'); return; }
  pushHistory();
  bar.in = newIn; bar.out = newOut;
  if(bar.breaks) bar.breaks = bar.breaks.map(function(b){ return {in:b.in+delta, out:b.out+delta}; });
  renderAll();
  saveDraftToFirestore(weekIdx);
  refreshBarPopover(weekIdx,sub,day,idx);
}
function buildBarPopoverHtml(weekIdx, sub, day, idx){

    + '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px;font-size:12px;gap:8px;">'

    + '<div style="border-top:0.5px solid var(--bd);margin:4px 0;"></div>';

  } else {
    html += '<div onclick="setBreak('+wkArg+',&quot;'+sub+'&quot;,'+day+','+idx+')">休憩を'+(bar.breaks&&bar.breaks.length?'変更':'設定')+'</div>';
    if(bar.breaks && bar.breaks.length){
      html += '<div onclick="clearBreak('+wkArg+',&quot;'+sub+'&quot;,'+day+','+idx+')">休憩を解除</div>';
    }

    }

    html += '<div class="none">入れる人がいません</div>';
  } else {
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 4px;">'
      + candidates.map(function(c){ return '<div onclick="assignName('+wkArg+',&quot;'+sub+'&quot;,'+day+','+idx+',&quot;'+c.name+'&quot;)">'+c.name+(c.store==='both'?'（兼務可）':'')+(bar.unassigned?'を選択':'に変更')+'</div>'; }).join('')
      + '</div>';
  }
  html += '<div style="border-top:0.5px dashed var(--bd);margin:4px 0;"></div>'

function buildEmergencyPopoverHtml(weekIdx, sub, day, idx){
  var wkArg = (typeof weekIdx === 'string') ? ('&quot;'+weekIdx+'&quot;') : weekIdx;
  var draft = getBoard(weekIdx)[sub];
  var bar = draft[day].staff[idx];
  var assignedRanges = {};
  ['honten','hospital'].forEach(function(s){
    if(!getBoard(weekIdx)[s]) return;
    getBoard(weekIdx)[s][day].staff.forEach(function(x){
      if(!x.n) return;
      if(!assignedRanges[x.n]) assignedRanges[x.n] = [];
      assignedRanges[x.n].push({in:x.in, out:x.out});
    });
  });
  function timeOverlaps(a,b){ return a.in < b.out && b.in < a.out; }
  var others = EMPLOYEES.filter(function(e){
    if(e.active===false) return false;
    if(e.name===bar.n) return false;
    var existing = assignedRanges[e.name];
    if(existing && existing.length){
      if(e.store!=='both') return false; // 兼務不可の人は同日の二重勤務不可（緊急時でも二重勤務は防止）
      if(existing.some(function(r){ return timeOverlaps(r, {in:bar.in, out:bar.out}); })) return false;
    }
    return true; // 希望との一致は問わない
  });
  var html = '<div style="padding:4px 8px 8px;font-size:12px;color:var(--t2);">⚠ 希望と一致しない人も含めて表示しています</div>';

      + '</div>';
  }

    + '<div onclick="document.getElementById(&quot;name-popover&quot;).innerHTML=buildBarPopoverHtml('+wkArg+',&quot;'+sub+'&quot;,'+day+','+idx+')">← 戻る</div>';
  return html;
}
function assignNameEmergency(weekIdx, sub, day, idx, name){
  if(!confirm(name+'さんは、この時間帯の希望と一致していない可能性があります。緊急対応として割り当てますか？')) return;
  assignName(weekIdx, sub, day, idx, name);
}
function positionPopover(pop, rect){
  pop.style.visibility = 'hidden';
  pop.style.left = '0px';
  pop.style.top = '0px';
  document.body.appendChild(pop);
  var pw = pop.offsetWidth, ph = pop.offsetHeight;
  var vw = window.innerWidth, vh = window.innerHeight;
  var left = rect.left;
  if(left + pw > vw - 8) left = vw - pw - 8;
  if(left < 8) left = 8;
  var top;
  if(rect.bottom + 4 + ph > vh - 8){
    top = rect.top - ph - 4; // 画面下部に収まらない場合は上方向に開く
    if(top < 8) top = 8;
  } else {
    top = rect.bottom + 4;
  }
  pop.style.left = (left+window.scrollX)+'px';
  pop.style.top = (top+window.scrollY)+'px';
  pop.style.visibility = 'visible';
}
function refreshBarPopover(weekIdx, sub, day, idx){
  var pop = document.getElementById('name-popover');
  if(!pop) return;
  if(pop.dataset.wk!==String(weekIdx) || pop.dataset.sub!==sub || pop.dataset.day!==String(day) || pop.dataset.idx!==String(idx)) return;
  pop.innerHTML = buildBarPopoverHtml(weekIdx, sub, day, idx);
}
function onBarClick(ev, weekIdx, sub, day, idx){
  ev.stopPropagation();
  closePopover();
  var pop = document.createElement('div');
  pop.className='popover'; pop.id='name-popover';
  pop.dataset.wk = String(weekIdx); pop.dataset.sub = sub; pop.dataset.day = String(day); pop.dataset.idx = String(idx);
  var rect = ev.currentTarget.getBoundingClientRect();
  pop.innerHTML = buildBarPopoverHtml(weekIdx, sub, day, idx);
  positionPopover(pop, rect);
  popoverOutsideClickHandler = function(e){
    var r = pop.getBoundingClientRect();
    if(e.clientX < r.left || e.clientX > r.right || e.clientY < r.top || e.clientY > r.bottom){
      closePopover();
    }
  };
  setTimeout(function(){ document.addEventListener('click', popoverOutsideClickHandler); },0);
}
function setBreak(weekIdx,sub,day,idx){
  closePopover();
  var bar = getBoard(weekIdx)[sub][day].staff[idx];
  var cur = bar.breaks && bar.breaks[0];
  var curStr = cur ? (cur.out-cur.in>1 ? cur.in+'-'+(cur.out-1) : String(cur.in)) : '';
  var input = prompt('休憩の時間帯を入力してください（1コマ=1時間の考え方です）\n例: 11 → 11時台のみ休憩\n例: 11-13 → 11〜13時台まで休憩（3時間）', curStr);
  if(input===null || input.trim()==='') return;
  var m = input.trim().match(/^(\d+)[-~～](\d+)$/);
  var bi, bo;
  if(m){ bi = Number(m[1]); bo = Number(m[2])+1; }
  else {
    var single = Number(input.trim());
    if(isNaN(single)){ alert('入力形式が正しくありません（例: 11 または 11-13）'); return; }
    bi = single; bo = single+1;
  }
  if(isNaN(bi) || isNaN(bo) || bo<=bi || bi<bar.in || bo>bar.out){
    alert('勤務時間（'+bar.in+'〜'+bar.out+'時）の範囲内で入力してください');
    return;
  }
  pushHistory();
  bar.breaks = [{in:bi, out:bo}];
  renderAll();
  saveDraftToFirestore(weekIdx);
}
function clearBreak(weekIdx,sub,day,idx){

function buildBarHtml(s, gST, sp, weekIdx, sub, di, idx, isRef){
  var wkArg = (typeof weekIdx === 'string') ? ('&quot;'+weekIdx+'&quot;') : weekIdx;
  if(s.unassigned){
    var lu=((s.in-gST)/sp*100).toFixed(1), ru=((gST+sp-s.out)/sp*100).toFixed(1);
    var attrsU = 'draggable="true" '
      + 'ondragstart="onBarDragStart(event,'+wkArg+',&quot;'+sub+'&quot;,'+di+','+idx+')" '
      + 'ondragover="onBarDragOver(event)" ondragleave="onBarDragLeave(event)" '
      + 'ondrop="onBarDrop(event,'+wkArg+',&quot;'+sub+'&quot;,'+di+','+idx+')" '
      + 'onclick="onBarClick(event,'+wkArg+',&quot;'+sub+'&quot;,'+di+','+idx+')"';
    return '<div class="g-bar unassigned" '+attrsU+' style="left:'+lu+'%;right:'+ru+'%;"><span class="nm">未設定</span></div>';
  }
  var breaks = (s.breaks||[]).slice().sort(function(a,b){return a.in-b.in;});
  var segs = [];
  var cur = s.in;
  breaks.forEach(function(b){
    if(b.in>cur) segs.push({in:cur,out:b.in,brk:false});
    segs.push({in:b.in,out:b.out,brk:true});
    cur = b.out;
  });
  if(cur<s.out) segs.push({in:cur,out:s.out,brk:false});
  var col = isRef ? '#ffa000' : empColor(s.n);
  var isDual = !!s.dual || isRef;
  var widestIdx=-1, widestLen=-1;
  segs.forEach(function(seg,i){ if(!seg.brk){ var len=seg.out-seg.in; if(len>widestLen){widestLen=len;widestIdx=i;} } });
  var attrs = isRef ? (
    'onclick="onBarClick(event,'+wkArg+',&quot;hospital&quot;,'+di+','+idx+')" '
    + 'style="cursor:pointer;'
  ) : (
    'draggable="true" '
    + 'ondragstart="onBarDragStart(event,'+wkArg+',&quot;'+sub+'&quot;,'+di+','+idx+')" '
    + 'ondragover="onBarDragOver(event)" ondragleave="onBarDragLeave(event)" '
    + 'ondrop="onBarDrop(event,'+wkArg+',&quot;'+sub+'&quot;,'+di+','+idx+')" '
    + 'onclick="onBarClick(event,'+wkArg+',&quot;'+sub+'&quot;,'+di+','+idx+')" '
    + 'style="'
  );
  var html='';
  segs.forEach(function(seg,i){
    var l=((seg.in-gST)/sp*100).toFixed(1), r=((gST+sp-seg.out)/sp*100).toFixed(1);
    if(seg.brk){
      html += '<div style="position:absolute;top:2px;bottom:2px;left:'+l+'%;right:'+r+'%;background:#c9f7c9;border-radius:0;"></div>';
    } else {
      var dur = seg.out-seg.in;
      var label = labelMode==='hours' ? String(dur) : (i===widestIdx ? s.n : '');
      var border = '';
      html += '<div class="g-bar" '+attrs+'left:'+l+'%;right:'+r+'%;background:'+col+';'+border+'">'
        + '<span class="nm">'+label+'</span></div>';
    }
  });
  return html;
}

function positionModalNearTrigger(modalId, ev){
  var modal = document.getElementById(modalId);
  var pane = ev && ev.target && ev.target.closest ? ev.target.closest('#pane-a-content, #pane-b-content') : null;
  if(pane){
    var r = pane.getBoundingClientRect();
    var top = Math.max(r.top, 0);
    var left = Math.max(r.left, 0);
    var bottom = Math.min(r.bottom, window.innerHeight);
    var right = Math.min(r.right, window.innerWidth);
    var w = right - left, h = bottom - top;
    if(w > 100 && h > 100){
      modal.style.left = left+'px';
      modal.style.top = top+'px';
      modal.style.width = w+'px';
      modal.style.height = h+'px';
      modal.style.right = 'auto';
      modal.style.bottom = 'auto';
      return;
    }
  }
  modal.style.left = '';
  modal.style.top = '';
  modal.style.width = '';
  modal.style.height = '';
  modal.style.right = '';
  modal.style.bottom = '';
}

  var name = document.getElementById('mi-name-select').value;

  var name = prompt('氏名を入力');
  if(!name || !name.trim()) return;
  if(EMPLOYEES.some(function(e){return e.name===name.trim();})){ alert('同じ名前の従業員が既にいます'); return; }
  var storeChoice = prompt('店舗を番号で選択\n1: 本店のみ\n2: 兼務可能\n3: 病院のみ', '1');
  if(storeChoice===null) return;
  var store = storeChoice.trim()==='2' ? 'both' : storeChoice.trim()==='3' ? 'hospital' : 'honten';
  var usedColors = EMPLOYEES.map(function(e){return e.color;});
  var color = COLOR_PALETTE.find(function(c){return usedColors.indexOf(c)===-1;}) || COLOR_PALETTE[EMPLOYEES.length % COLOR_PALETTE.length];

function addCon(ei){
  var opts = CON_TYPES.map(function(t,i){ return i+':'+t.label; }).join(String.fromCharCode(10));
  var sel = prompt('追加する制約を番号で選んでください'+String.fromCharCode(10)+opts);
  if(sel===null) return;
  var idx = parseInt(sel,10);
  if(isNaN(idx) || !CON_TYPES[idx]) return;

  if(t.hasValue){ val = prompt(t.label+'（'+t.valueLabel+'）を入力'); if(val===null) return; }
  pushHistory();

}
function renameEmployee(ei){
  var oldName = EMPLOYEES[ei].name;
  var newName = prompt('新しい氏名を入力してください', oldName);
  if(!newName) return;
  newName = newName.trim();
  if(!newName || newName===oldName) return;
  if(EMPLOYEES.some(function(e,i){ return i!==ei && e.name===newName; })){
    alert('同じ名前の従業員が既にいます');
    return;
  }
  if(!confirm('「'+oldName+'」を「'+newName+'」に変更します。\n過去の希望・下書き・公開済みシフトもすべて置き換わります。よろしいですか？')) return;
  pushHistory();

  // ローカルデータを一括置換
  EMPLOYEES[ei].name = newName;
  DRAFTS.forEach(function(draft){
    if(!draft) return;
    ['honten','hospital'].forEach(function(sub){
      draft[sub].forEach(function(day){
        day.staff.forEach(function(s){ if(s.n===oldName) s.n = newName; });
      });
    });
  });
  Object.keys(AVAIL_DATA).forEach(function(weekId){
    if(AVAIL_DATA[weekId] && AVAIL_DATA[weekId][oldName]){
      AVAIL_DATA[weekId][newName] = AVAIL_DATA[weekId][oldName];
      delete AVAIL_DATA[weekId][oldName];
    }
  });
  HISTORY_SHIFTS.forEach(function(h){
    ['honten','hospital'].forEach(function(sub){
      (h[sub]||[]).forEach(function(day){
        (day.staff||[]).forEach(function(s){ if(s.n===oldName) s.n = newName; });
      });
    });
  });
  renderAll();

  // Firestoreへ反映
  pendingWrites++;
  var newData = {name:newName, store:EMPLOYEES[ei].store, role:EMPLOYEES[ei].role, color:EMPLOYEES[ei].color, constraints:EMPLOYEES[ei].constraints, active:EMPLOYEES[ei].active, regularShift:EMPLOYEES[ei].regularShift||null};
  var tasks = [];
  tasks.push(fbDb.collection('employees').doc(newName).set(newData));
  tasks.push(fbDb.collection('employees').doc(oldName).delete());

  // availability（現在表示中の週の範囲のみ。範囲外の古い週データは対象外）
  allNeededWeekIds().forEach(function(weekId){
    tasks.push(fbDb.collection('availability').doc(weekId+'_'+oldName).get().then(function(doc){
      if(!doc.exists) return null;
      var data = doc.data();
      return Promise.all([
        fbDb.collection('availability').doc(weekId+'_'+newName).set(data),
        fbDb.collection('availability').doc(weekId+'_'+oldName).delete()
      ]);
    }));
  });

  // drafts（シフト作成の表示中の週）
  WEEKS_CREATE.forEach(function(w, idx){
    if(DRAFTS[idx]) tasks.push(fbDb.collection('drafts').doc(w.weekId).set(DRAFTS[idx]));
  });

  // shifts（公開済みシフト全件）
  HISTORY_SHIFTS.filter(function(h){ return h._fromFirestore; }).forEach(function(h){
    tasks.push(fbDb.collection('shifts').doc(h.weekId).set({label:h.label, honten:h.honten, hospital:h.hospital}, {merge:true}));
  });

  Promise.all(tasks).then(function(){
    showToast('氏名を変更しました（'+oldName+' → '+newName+'）');
  }).catch(function(err){
    showFbError('氏名変更の一部処理に失敗しました: '+err.message);
  }).then(function(){
    pendingWrites--;
  });
}

function deleteEmployee(ei){
  var emp = EMPLOYEES[ei];
  if(!confirm('本当に削除しますか？（'+emp.name+'）\nこの操作は取り消せません。Firestoreのデータも完全に削除されます。')) return;
  pushHistory();
  var name = emp.name;
  EMPLOYEES.splice(ei,1);
  renderAll();
  pendingWrites++;
  var weekIds = allNeededWeekIds();
  var deletes = [fbDb.collection('employees').doc(name).delete()];
  weekIds.forEach(function(weekId){
    deletes.push(fbDb.collection('availability').doc(weekId+'_'+name).delete().catch(function(){}));
    if(AVAIL_DATA[weekId]) delete AVAIL_DATA[weekId][name];
  });
  Promise.all(deletes).then(function(){
    showToast('削除しました（'+name+'）');
    renderAll();
  }).catch(function(err){
    showFbError('削除に失敗しました（'+name+'）: '+err.message);
  }).then(function(){
    pendingWrites--;
  });
}

  var ts = now.getFullYear()+'/'+String(now.getMonth()+1).padStart(2,'0')+'/'+String(now.getDate()).padStart(2,'0');
  var entry = {

  fbDb.collection('shifts').doc(weekId).set({
    label: entry.label,

  }).then(function(){

    renderAll();
  }).catch(function(err){
    showFbError('公開に失敗しました: '+err.message);
  }).then(function(){
    pendingWrites--;
  });
}

function minSegs(store){ return store==='honten' ? MIN_SEG_HONTEN : MIN_SEG_HOSPITAL; }

function requiredMinAt(store, hour){
  var segs = minSegs(store);
  var seg = segs.find(function(r){ return hour>=r.hFrom && hour<r.hTo; });
  return seg ? seg.min : 1;
}

function minSegColor(min){
  return min>=3 ? '#d93030' : min===2 ? '#e08a1e' : '#2a9e52';
}

function renderMinBoardHtml(store){
  var gST = store==='hospital'?7:6, gEN = store==='hospital'?20:23;
  var sp = gEN-gST;
  var segs = minSegs(store);
  var bg = makeStripes(gST,gEN);
  var html = '<div class="gantt-outer"><div class="gantt-inner">';
  html += '<div class="g-bar-row"><div class="g-row-lbl" style="height:20px;font-size:0;"></div><div class="g-track" style="height:20px;">'+bg+makeTicks(gST,gEN)+'</div></div>';
  html += '<div class="g-bar-row"><div class="g-row-lbl" style="font-size:11px;">最低人数</div><div class="g-track" style="height:34px;">';
  segs.forEach(function(seg, i){
    var l=((seg.hFrom-gST)/sp*100).toFixed(1), r=((gEN-seg.hTo)/sp*100).toFixed(1);
    html += '<div class="g-bar" style="left:'+l+'%;right:'+r+'%;background:'+minSegColor(seg.min)+';cursor:pointer;" onclick="onMinSegClick(event,&quot;'+store+'&quot;,'+i+')"><span class="nm">最低'+seg.min+'人</span></div>';
  });
  html += '</div></div></div></div>';
  return html;
}

function renderStaffRuleHtml(){
  var html = '<div class="panel-ttl">時間帯別 最低人数設定</div>';
  html += '<div class="legend">セグメントをクリックすると人数の増減・区切り位置の調整ができます</div>';
  html += '<div style="margin-bottom:8px;font-size:13px;font-weight:600;">本店</div>' + renderMinBoardHtml('honten');
  html += '<div style="margin:16px 0 8px;font-size:13px;font-weight:600;">病院店</div>' + renderMinBoardHtml('hospital');
  return html;
}

function onMinSegClick(ev, store, idx){
  ev.stopPropagation();
  closePopover();
  var segs = minSegs(store);
  var seg = segs[idx];
  var pop = document.createElement('div');
  pop.className='popover'; pop.id='name-popover';
  var rect = ev.currentTarget.getBoundingClientRect();
  pop.style.left = (rect.left+window.scrollX)+'px';
  pop.style.top = (rect.bottom+window.scrollY+4)+'px';
  var html = '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px;font-size:12px;gap:8px;">'
    + '<span>人数 '+seg.min+'人</span><span><button onclick="adjustMinCount(&quot;'+store+'&quot;,'+idx+',-1)" style="width:24px;height:24px;">−</button> <button onclick="adjustMinCount(&quot;'+store+'&quot;,'+idx+',1)" style="width:24px;height:24px;">＋</button></span></div>'
    + '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px;font-size:12px;gap:8px;">'
    + '<span>開始 '+seg.hFrom+'時</span><span><button onclick="adjustMinBoundary(&quot;'+store+'&quot;,'+idx+',&quot;start&quot;,-1)" style="width:24px;height:24px;">−</button> <button onclick="adjustMinBoundary(&quot;'+store+'&quot;,'+idx+',&quot;start&quot;,1)" style="width:24px;height:24px;">＋</button></span></div>'
    + '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px;font-size:12px;gap:8px;">'
    + '<span>終了 '+seg.hTo+'時</span><span><button onclick="adjustMinBoundary(&quot;'+store+'&quot;,'+idx+',&quot;end&quot;,-1)" style="width:24px;height:24px;">−</button> <button onclick="adjustMinBoundary(&quot;'+store+'&quot;,'+idx+',&quot;end&quot;,1)" style="width:24px;height:24px;">＋</button></span></div>';
  pop.innerHTML = html;
  document.body.appendChild(pop);
  setTimeout(function(){ document.addEventListener('click', closePopover, {once:true}); },0);
}
function adjustMinCount(store, idx, delta){
  closePopover();
  var seg = minSegs(store)[idx];
  var v = seg.min+delta;
  if(v<1){ alert('1人未満にはできません'); return; }
  pushHistory();
  seg.min = v;
  renderAll();
}
function adjustMinBoundary(store, idx, edge, delta){
  closePopover();
  var segs = minSegs(store);
  var seg = segs[idx];
  if(edge==='start'){
    if(idx===0){ alert('先頭のセグメントの開始は変更できません'); return; }
    var prev = segs[idx-1];
    var newBoundary = seg.hFrom+delta;
    if(newBoundary<=prev.hFrom || newBoundary>=seg.hTo){ alert('隣のセグメントとの間に最低1時間は必要です'); return; }
    pushHistory();
    prev.hTo = newBoundary; seg.hFrom = newBoundary;
  } else {
    if(idx===segs.length-1){ alert('末尾のセグメントの終了は変更できません'); return; }
    var next = segs[idx+1];
    var newBoundary2 = seg.hTo+delta;
    if(newBoundary2<=seg.hFrom || newBoundary2>=next.hTo){ alert('隣のセグメントとの間に最低1時間は必要です'); return; }
    pushHistory();
    seg.hTo = newBoundary2; next.hFrom = newBoundary2;
  }
  renderAll();
}


function renderContent(view){
  if(view==='create') return renderCreatePanelHtml(curWeek);
  if(view==='sched') return renderSchedHtml();
  if(view==='emp') return renderEmpHtml() + '<div style="height:28px;"></div><div style="font-size:16px;font-weight:700;margin-bottom:12px;">人員設定</div>' + renderStaffRuleHtml();
  if(view==='hist') return renderHistHtml();
  return '';
}

function swWeek(i){ curWeek=i; renderAll(); }
function swSub(s){ curSub=s; renderAll(); }

function swMain(tab, el){
  mainTab = tab;
  document.querySelectorAll('#main-tabs .tab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  document.querySelectorAll('.single').forEach(function(p){p.classList.remove('on');});
  document.getElementById('single-'+tab).classList.add('on');
  renderAll();
}
var paneA = 'create', paneB = 'sched';
function setPane(pane, view){
  if(pane==='a') paneA = view; else paneB = view;
  renderAll();
}
function setLayout(mode, el){
  layoutMode = mode;
  document.querySelectorAll('#layout-sw div').forEach(function(d){d.classList.remove('on');});
  el.classList.add('on');
  if(mode==='single'){
    document.getElementById('main-tabs').style.display='flex';
    document.getElementById('split-view').classList.remove('on');
    document.querySelectorAll('.single').forEach(function(p){p.classList.remove('on');});
    document.getElementById('single-'+mainTab).classList.add('on');
  } else {
    document.getElementById('main-tabs').style.display='none';
    document.querySelectorAll('.single').forEach(function(p){p.classList.remove('on');});
    document.getElementById('split-view').classList.add('on');
  }
  renderAll();
}

function renderAll(){
  ['create','sched','emp','hist'].forEach(function(v){
    var el = document.getElementById('single-'+v);
    if(el && el.classList.contains('on')) el.innerHTML = renderContent(v);
  });
  document.getElementById('pane-a-content').innerHTML = renderContent(paneA);
  document.getElementById('pane-b-content').innerHTML = renderContent(paneB);
}

initApp();

</script>
</body>
</html>
